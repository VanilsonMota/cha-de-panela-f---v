<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chá de Panela - Fernanda & Vitor</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #fff5f8;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
}

h1 {
  text-align: center;
  color: #d63384;
}

h2 {
  margin-top: 30px;
  color: #444;
  border-bottom: 2px solid #eee;
  padding-bottom: 5px;
}

.item {
  background: white;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: 0.2s;
}

.item:hover {
  transform: scale(1.02);
}

.reservado {
  background: #e0e0e0;
  text-decoration: line-through;
}

.info {
  display: flex;
  flex-direction: column;
}

.nome {
  font-size: 12px;
  color: #555;
}

button {
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}

.btn-reservar {
  background: #d63384;
  color: white;
}

.btn-remover {
  background: #999;
  color: white;
}

.contador {
  text-align: center;
  margin-top: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
<h1>🏠 Chá de Panela</h1>
<p style="text-align:center;">👰 Fernanda & 🤵 Vitor</p>

<div id="lista"></div>

<div class="contador" id="contador">
📊 0 itens escolhidos
</div>

<p style="text-align:center;">💕 Obrigada pela presença!</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAn04Zv4PhlkxE_9DPdw-2x0q0ImgoI8YY",
  authDomain: "lista-cha-panela-42e96.firebaseapp.com",
  projectId: "lista-cha-panela-42e96",
  storageBucket: "lista-cha-panela-42e96.firebasestorage.app",
  messagingSenderId: "484481046376",
  appId: "1:484481046376:web:cd8a1cdd70ff0252f0a8dd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 📦 Itens por categoria
const categorias = {
  "🛏️ Quarto": [
    "Jogo de lençol","Edredom","Travesseiro","Cesto de roupas","Cortinas","Tábua de passar roupa"
  ],
  "🍳 Cozinha": [
    "Utensílios de cozinha","Faqueiro","Jogo de copos","Tapete de cozinha","Pano de louça","Formas",
    "Potes organizadores","Fruteira de mesa","Jarra de vidro","Toalha de mesa","Tábua de cortar carne"
  ],
  "🛁 Banheiro": [
    "Jogo de toalha de banho","Tapete de banheiro","Toalhas de mão","Organizadores / saboneteira"
  ],
  "🛋️ Sala": [
    "Colcha para sofá","Almofadas","Vaso decorativo"
  ]
};

const lista = document.getElementById("lista");
const contador = document.getElementById("contador");

// 🔁 Atualiza contador
function atualizarContador() {
  const reservados = document.querySelectorAll(".reservado").length;
  const total = document.querySelectorAll(".item").length;
  contador.innerText = `📊 ${reservados} de ${total} itens escolhidos`;
}

// 🏗️ Montar lista
Object.keys(categorias).forEach(categoria => {

  const titulo = document.createElement("h2");
  titulo.innerText = categoria;
  lista.appendChild(titulo);

  categorias[categoria].forEach((nomeItem, index) => {
    const id = categoria + "_" + index;

    const div = document.createElement("div");
    div.className = "item";

    const info = document.createElement("div");
    info.className = "info";

    const nome = document.createElement("strong");
    nome.innerText = nomeItem;

    const pessoa = document.createElement("div");
    pessoa.className = "nome";

    info.appendChild(nome);
    info.appendChild(pessoa);

    const botao = document.createElement("button");
    botao.className = "btn-reservar";
    botao.innerText = "Reservar";

    div.appendChild(info);
    div.appendChild(botao);

    lista.appendChild(div);

    // 🔄 Tempo real
    onSnapshot(doc(db, "lista", id), (docSnap) => {
      if (docSnap.exists()) {
        const data = docSnap.data();
        div.classList.add("reservado");
        pessoa.innerText = "Reservado por: " + data.nome;

        botao.innerText = "Remover";
        botao.className = "btn-remover";

      } else {
        div.classList.remove("reservado");
        pessoa.innerText = "";

        botao.innerText = "Reservar";
        botao.className = "btn-reservar";
      }

      atualizarContador();
    });

    // 🖱️ Ação do botão
    botao.onclick = async () => {
      if (div.classList.contains("reservado")) {
        await deleteDoc(doc(db, "lista", id));
      } else {
        const nomePessoa = prompt("Digite seu nome:");
        if (nomePessoa) {
          await setDoc(doc(db, "lista", id), {
            nome: nomePessoa
          });
        }
      }
    };

  });
});
</script>

</body>
</html>
